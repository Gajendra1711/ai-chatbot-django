<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 100%;
        max-width: 420px;
        height: 90vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .chat-header {
        padding: 16px;
        background: #4a6cf7;
        color: white;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
    }

    .chat-body {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.4;
    }

    .bot {
        align-self: flex-start;
        background: #f1f3f6;
        color: #333;
        border-bottom-left-radius: 4px;
    }

    .user {
        align-self: flex-end;
        background: #4a6cf7;
        color: white;
        border-bottom-right-radius: 4px;
    }

    .chat-footer {
        display: flex;
        padding: 10px;
        border-top: 1px solid #eee;
        background: #fff;
    }

    .chat-footer input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        outline: none;
        font-size: 14px;
    }

    .chat-footer button {
        margin-left: 8px;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        background: #4a6cf7;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
    }

    .chat-footer button:hover {
        background: #3b57d1;
    }

    /* Scrollbar styling */
    .chat-body::-webkit-scrollbar {
        width: 6px;
    }

    .chat-body::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
    }

    /* Mobile */
    @media (max-width: 500px) {
        .chat-container {
            height: 100vh;
            border-radius: 0;
        }
    }
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        AI Chatbot
    </div>

    <div class="chat-body" id="chatBody">
        <!-- Example messages -->
        <div class="message bot">Hello! How can I help you?</div>
        <div class="message user">I need assistance.</div>
    </div>

    <div class="chat-footer">
        <input type="text" placeholder="Type a message..." id="messageInput">
        <button>Send</button>
    </div>

</div>

<script>
const button = document.querySelector("button");
const input = document.getElementById("messageInput");
const chatBody = document.getElementById("chatBody");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

button.addEventListener("click", sendMessage);

function sendMessage() {
    let message = input.value.trim();

    // ❌ Prevent empty message
    if (message === "") return;

    // Show user message
    chatBody.innerHTML += `<div class="message user">${message}</div>`;

    // Show typing...
    let typingDiv = document.createElement("div");
    typingDiv.className = "message bot";
    typingDiv.innerText = "Typing...";
    chatBody.appendChild(typingDiv);

    // Auto scroll
    chatBody.scrollTop = chatBody.scrollHeight;

    fetch("/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        // Replace typing with real reply
        typingDiv.innerText = data.reply;

        // Auto scroll
        chatBody.scrollTop = chatBody.scrollHeight;
    });

    input.value = "";
    
}

// CSRF token function
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}
</script>

</body>
</html>
